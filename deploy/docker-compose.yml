x-app-env: &app-env
  MYSQL_HOST: mysql
  MYSQL_PORT: 3306
  MYSQL_PASSWORD: root123
  REDIS_HOST: redis
  NACOS_ADDR: nacos:8848
  ROCKETMQ_NAMESRV: rocketmq-namesrv:9876

services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: forum-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Shanghai
    ports:
      # 3307 avoids conflict with a local MySQL on 3306 (IDEA runs on host, not in Docker)
      - "3307:3306"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: forum-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nacos:
    # Apple Silicon 需用 amd64 镜像（Docker Desktop 会通过 Rosetta 模拟）
    platform: linux/amd64
    image: docker.m.daocloud.io/nacos/nacos-server:v2.3.2
    container_name: forum-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10

  rocketmq-namesrv:
    platform: linux/amd64
    image: docker.m.daocloud.io/apache/rocketmq:5.1.4
    container_name: forum-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9876"]
      interval: 10s
      timeout: 5s
      retries: 10

  rocketmq-broker:
    platform: linux/amd64
    image: docker.m.daocloud.io/apache/rocketmq:5.1.4
    container_name: forum-rocketmq-broker
    depends_on:
      rocketmq-namesrv:
        condition: service_started
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-5.1.4/conf/broker.conf

  api-gateway:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
      args:
        MODULE: api-gateway
    container_name: forum-api-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_healthy
      rocketmq-broker:
        condition: service_started
    environment:
      <<: *app-env
    ports:
      - "8080:8080"

  user-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
      args:
        MODULE: user-service
    container_name: forum-user-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8081:8081"

  post-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
      args:
        MODULE: post-service
    container_name: forum-post-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_healthy
      rocketmq-broker:
        condition: service_started
    environment:
      <<: *app-env
    ports:
      - "8082:8082"

  notification-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
      args:
        MODULE: notification-service
    container_name: forum-notification-service
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-broker:
        condition: service_started
    environment:
      <<: *app-env
    ports:
      - "8083:8083"

  file-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
      args:
        MODULE: file-service
    container_name: forum-file-service
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      <<: *app-env
    volumes:
      - file_uploads:/app/uploads
    ports:
      - "8084:8084"

  admin-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
      args:
        MODULE: admin-service
    container_name: forum-admin-service
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8085:8085"

  frontend:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: forum-frontend
    depends_on:
      - api-gateway
    ports:
      - "8088:80"

volumes:
  mysql_data:
  redis_data:
  file_uploads:
